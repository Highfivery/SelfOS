name: Release

# Hands-off distribution (19-distribution):
#   1. release-please reads the Conventional Commits on `main`, keeps a "Release vX.Y.Z" PR open, and
#      — when that PR is merged — bumps the version, writes the changelog, and PUBLISHES the GitHub
#      Release immediately (config `draft: false`). Publishing creates the git tag right away, so when
#      release-please re-runs on the same merge push it SEES the new tag and does NOT re-propose the
#      just-released commit as a phantom next patch (the draft-release had no tag yet → the old
#      re-proposal loop that needed a per-release bootstrap-sha bump; now gone).
#   2. build-macos then builds the desktop app on a macOS runner and uploads the `.dmg` to that
#      published release (electron-builder `releaseType: release`). Trade-off: the release is visible
#      for the ~3 min the build runs before the installer attaches.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR / draft release
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-macos:
    name: Build & publish macOS installer
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # Check out the merged Release-PR commit by SHA — the commit release-please just version-bumped,
      # tagged, and published. (Equivalent to the tag now that the release publishes non-draft; SHA needs
      # no tag-name plumbing.)
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The relay Worker bundle lives outside the desktop build; build it so electron-builder's
      # extraResources can package it (otherwise relay:connect fails with "Worker bundle is missing").
      - name: Build relay Worker bundle
        run: pnpm --filter @selfos/relay build

      - name: Build desktop app
        run: pnpm --filter @selfos/desktop build

      # electron-builder packages the .dmg and uploads it to the matching GitHub Release (the draft
      # release-please created) via the `publish` block in electron-builder.yml. No extra secret and
      # no API key/vault data is in the build — only the ephemeral GITHUB_TOKEN.
      - name: Package & publish the .dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SELFOS_BUILD_SHA: ${{ github.sha }}
        run: pnpm --filter @selfos/desktop exec electron-builder --mac --publish always

      # Defensive no-op: the release is already published (config `draft: false`). Kept so the release is
      # guaranteed non-draft even if a future change flips drafting back on.
      - name: Ensure the release is published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.release-please.outputs.tag_name }}" --draft=false
