appId: com.selfos.app
productName: SelfOS
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
# The relay Cloudflare Worker bundle is built separately (apps/relay → dist/worker.js + meta.json) and
# lives outside out/, so copy it into the app's Resources for the host to upload at deploy time
# (08-questionnaires §5.4). loadRelayBundle reads it from process.resourcesPath/relay in the packaged app.
extraResources:
  - from: ../relay/dist
    to: relay
mac:
  category: public.app-category.healthcare-fitness
  target: dmg
# win/linux targets stay declared but are not built by the release workflow yet (19-distribution §12).
win:
  target: nsis
linux:
  target: AppImage
# Upload the built installer to GitHub Releases (19-distribution §4). The release job runs
# `electron-builder --mac --publish always`, which attaches the .dmg to the matching tag's release.
publish:
  provider: github
  owner: Highfivery
  repo: SelfOS
